name: Keep Backend Alive

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Pinging backend..."

          curl --location --request GET 'https://tours-travel-ph6y.onrender.com/api/system/health' \
          --fail \
          --show-error \
          --silent \
          --max-time 30 \
          --retry 5 \
          --retry-delay 5 \
          --retry-connrefused \
          --write-out "\nHTTP Status: %{http_code}\nTotal Time: %{time_total}s\n"