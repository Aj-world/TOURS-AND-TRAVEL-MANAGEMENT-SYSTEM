name: Keep Backend Alive

on:
  schedule:
    - cron: "*/7 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest

    steps:
      - name: Ping Health Endpoint
        run: |
          echo "Warming up backend..."
          
          # Warm-up request (ignore failure)
          curl -s https://tours-travel-ph6y.onrender.com/api/system/health || true
          sleep 20
          
          echo "Running main health check..."
          
          curl --location --request GET 'https://tours-travel-ph6y.onrender.com/api/system/health' \
          --fail \
          --show-error \
          --silent \
          --max-time 120 \
          --retry 8 \
          --retry-delay 10 \
          --retry-connrefused \
          --write-out "\nHTTP Status: %{http_code}\nTotal Time: %{time_total}s\n"