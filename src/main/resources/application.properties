# H2 In-Memory Database
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.hikari.maximum-pool-size=5

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=true

# Enable H2 console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Security and payment secrets must be provided through environment variables.
# Example:
# JWT_SECRET=your-base64-encoded-jwt-secret
# RAZORPAY_KEY=your-razorpay-key-id
# RAZORPAY_SECRET=your-razorpay-key-secret
jwt.secret=${JWT_SECRET}
razorpay.key=${RAZORPAY_KEY}
razorpay.secret=${RAZORPAY_SECRET}

# Optional admin bootstrap settings. On first startup, if no ADMIN exists,
# the application creates one using these values.
# Example:
# BOOTSTRAP_ADMIN_NAME=System Admin
# BOOTSTRAP_ADMIN_EMAIL=admin@example.com
# BOOTSTRAP_ADMIN_PASSWORD=ChangeThisImmediately123!
bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:Default Admin}
bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:admin@travel.local}
bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}

# Server port
server.port=8081

logging.level.root=INFO
logging.level.com.aj.travel=DEBUG
logging.pattern.level=requestId=%X{requestId:-N/A} %5p
