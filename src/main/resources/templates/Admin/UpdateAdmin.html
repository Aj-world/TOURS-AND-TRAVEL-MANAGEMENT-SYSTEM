<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
	<meta charset="UTF-8">
	<title>Update User</title>
	<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css">
</head>
<body class="container mt-4">
	<h2>Update User</h2>
	<form method="post" th:action="@{/admin/users/{id}(id=${id})}">
		<div class="form-group">
			<label>Name</label>
			<input class="form-control" type="text" name="UserName1" required>
		</div>
		<div class="form-group">
			<label>Email</label>
			<input class="form-control" type="email" name="email" required>
		</div>
		<div class="form-group">
			<label>Phone</label>
			<input class="form-control" type="text" name="UserPhoneNO">
		</div>
		<div class="form-group">
			<label>Password (leave blank to keep existing)</label>
			<input class="form-control" type="password" name="UserPassword">
		</div>
		<button class="btn btn-primary" type="submit">Update</button>
	</form>
</body>
</html>
